<head>

  <!-- Fonts -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: { DEFAULT: '#f5f6fa', 2: '#b9bcc9', 3: '#6a6e80' },
            bg:  { DEFAULT: '#07070b', 2: '#0c0c14' },
            blue: '#4f7cff', violet: '#9d5cff', cyan: '#22d3ee',
            emerald: { 400: '#34d399' }
          },
          fontFamily: {
            sans:    ['Inter','system-ui','sans-serif'],
            display: ['"Inter Tight"','Inter','system-ui','sans-serif'],
            mono:    ['"JetBrains Mono"','ui-monospace','monospace']
          },
          borderRadius: { '4xl': '2rem' }
        }
      }
    };
  </script>

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <link rel="stylesheet" href="styles.css" />

  <script>
    (function () {
      try {
        var loc = window.location;
        if (loc.protocol !== 'file:') return;
        var scripts = document.querySelectorAll('script[type="text/babel"][src]');
        for (var i = 0; i < scripts.length; i++) {
          var s = scripts[i];
          var rel = s.getAttribute('src');
          if (!rel) continue;
          var base = loc.href.replace(/\/[^/]*$/, '/');
          s.setAttribute('src', base + rel.replace(/^\.\//, ''));
        }
      } catch (e) {}
    })();
  </script>

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>

  <!-- React / Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
